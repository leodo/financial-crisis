services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: financial_crisis
      POSTGRES_USER: financial
      POSTGRES_PASSWORD: financial
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial -d financial_crisis"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      FC_API_BIND: 0.0.0.0:8080
      DATABASE_URL: postgres://financial:financial@postgres:5432/financial_crisis
      RUST_LOG: info,fc_api=debug
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres-data:

